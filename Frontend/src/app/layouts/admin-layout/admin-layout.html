<div class="d-flex flex-row panel-shell panel-shell--admin">
  <div
    class="drawer-backdrop"
    [class.drawer-backdrop--visible]="drawerOpen()"
    aria-hidden="true"
    (click)="toggleDrawer()"
  ></div>

  <aside
    class="panel-sidebar"
    [class.panel-sidebar--open]="drawerOpen()"
    [class.panel-sidebar--desktop-collapsed]="sidebarCollapsed()"
    aria-label="Admin navigation"
  >
    <div class="panel-sidebar__brand">
      <a
        routerLink="/admin/dashboard"
        class="panel-brand panel-brand--logo-only"
        [title]="brandTitle() + ' — Admin home'"
      >
        @if (brandLogoUrl(); as logoSrc) {
          <img class="panel-brand__logo" [src]="logoSrc" [alt]="brandTitle()" />
        } @else {
          <span class="panel-brand__mark" aria-hidden="true"></span>
        }
      </a>
    </div>

    <nav class="panel-sidebar__scroll" aria-label="Primary">
      @for (group of navGroups; track group.title) {
        <section class="panel-nav-section">
          <h2 class="panel-nav-section__title">{{ group.title }}</h2>
          <app-sidebar-menu [items]="group.items" />
        </section>
      }
    </nav>

    <div class="panel-sidebar__footer">
      <a routerLink="/" class="panel-sidebar__storefront" title="Open storefront in same tab">
        <span class="panel-sidebar__storefront-icon" aria-hidden="true"></span>
        <span>View storefront</span>
      </a>
      <button type="button" class="btn panel-sidebar__logout" (click)="logout()">
        <span>Log out</span>
      </button>
    </div>
  </aside>

  <div class="d-flex flex-column flex-grow-1 min-w-0 panel-main">
    <header
      class="panel-topbar border-bottom bg-white d-flex align-items-center flex-wrap px-3 py-2 gap-2 shadow-sm"
    >
      <div class="d-flex align-items-center gap-3 flex-grow-1 min-w-0">
        <button
          type="button"
          class="panel-hamburger"
          aria-label="Toggle navigation menu"
          [attr.aria-expanded]="navPanelExpanded()"
          (click)="toggleDrawer()"
        ></button>
        <div class="panel-topbar__titles">
          <div class="text-muted small">Admin</div>
          <app-breadcrumb />
        </div>
      </div>

      <div class="panel-user" #userMenuRoot>
        <button
          type="button"
          class="avatar-btn"
          aria-haspopup="menu"
          [attr.aria-expanded]="userOpen()"
          (click)="toggleUser($event)"
        >
          <span class="avatar">
            @if (adminProfileImageUrl(); as imageUrl) {
              <img [src]="imageUrl" alt="Admin profile" />
            } @else {
              {{ adminInitial() }}
            }
          </span>
        </button>
        @if (userOpen()) {
          <div class="dropdown" role="menu">
            @if (adminUser(); as user) {
              <div class="px-3 py-2 border-bottom mb-1">
                <div class="fw-semibold">{{ user.name }}</div>
                <div class="text-muted text-sm text-truncate">{{ user.email }}</div>
              </div>
            }
            <a class="dropdown__item" routerLink="/admin/profile" (click)="userOpen.set(false)">
              Profile
            </a>
            <a class="dropdown__item" routerLink="/admin/app-config" (click)="userOpen.set(false)">
              Application settings
            </a>
            <button type="button" class="dropdown__item" (click)="logout()">Logout</button>
          </div>
        }
      </div>
    </header>

    <section class="panel-main__body flex-grow-1 overflow-auto">
      <div class="panel-content">
        <router-outlet />
      </div>
    </section>

    <footer class="border-top bg-white py-3 text-center small text-muted panel-footer">
      {{ footerLine() }}
    </footer>
  </div>
</div>
