<div class="d-flex flex-row panel-shell panel-shell--seller">
  <div
    class="drawer-backdrop"
    [class.drawer-backdrop--visible]="drawerOpen()"
    aria-hidden="true"
    (click)="toggleDrawer()"
  ></div>

  <aside
    class="panel-sidebar"
    [class.panel-sidebar--open]="drawerOpen()"
    [class.panel-sidebar--rail]="rail()"
  >
    <div class="panel-sidebar__brand">
      <a routerLink="/seller" class="panel-brand">
        <span class="panel-brand__mark"></span>
        @if (!rail()) {
          <span class="panel-brand__text">
            <span class="panel-brand__title">EtryMart</span>
            <span class="panel-brand__badge">Seller</span>
          </span>
        }
      </a>
      <button
        type="button"
        class="panel-sidebar-hamburger"
        [attr.aria-pressed]="rail()"
        aria-label="Toggle sidebar width"
        (click)="toggleRail()"
      ></button>
    </div>

    <div class="panel-sidebar__scroll">
      <app-sidebar-menu [items]="nav" [collapsed]="rail()" />
    </div>

    <div class="panel-sidebar__footer">
      <button type="button" class="btn btn-outline-light w-100" (click)="logout()">Logout</button>
    </div>
  </aside>

  <div class="d-flex flex-column flex-grow-1 min-vh-100 min-w-0 panel-main">
    <header
      class="panel-topbar border-bottom bg-white d-flex align-items-center flex-wrap px-3 py-2 gap-2 shadow-sm"
    >
      <div class="d-flex align-items-center gap-3 flex-grow-1 min-w-0">
        <button
          type="button"
          class="panel-hamburger"
          aria-label="Open navigation menu"
          (click)="toggleDrawer()"
        ></button>
        <div class="panel-topbar__titles">
          <div class="text-muted small">Seller</div>
          <app-breadcrumb />
        </div>
      </div>

      <div class="panel-user">
        <button
          type="button"
          class="avatar-btn"
          aria-haspopup="menu"
          [attr.aria-expanded]="userOpen()"
          (click)="toggleUser()"
        >
          <span class="avatar">S</span>
        </button>
        @if (userOpen()) {
          <div class="dropdown" role="menu">
            <a class="dropdown__item" routerLink="/seller/settings" (click)="userOpen.set(false)">
              Profile
            </a>
            <a class="dropdown__item" routerLink="/seller/settings" (click)="userOpen.set(false)">
              Settings
            </a>
            <button type="button" class="dropdown__item" (click)="logout()">Logout</button>
          </div>
        }
      </div>
    </header>

    <section class="panel-main__body flex-grow-1 overflow-auto bg-light">
      <div class="container-xl py-4">
        <router-outlet />
      </div>
    </section>

    <footer class="border-top bg-white py-3 text-center small text-muted panel-footer">
      © {{ year }} EtryMart. All rights reserved.
    </footer>
  </div>
</div>
