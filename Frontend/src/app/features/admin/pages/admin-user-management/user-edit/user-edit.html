<div class="page-header d-flex flex-wrap justify-content-between align-items-start gap-2">
  <div class="page-header__lead">
    <h1 class="heading-2">Edit user</h1>
    <p class="text-muted text-sm page-header__sub">Update account status and profile fields.</p>
  </div>
  <div class="d-flex flex-wrap gap-2">
    @if (userId(); as uid) {
      <a [routerLink]="['/admin/users', uid]" class="btn-admin-outline">View</a>
    }
    <a routerLink="/admin/users/list" class="btn-admin-outline">Back to list</a>
  </div>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body p-3">
    @if (loading()) {
      <p class="text-muted mb-0">Loading…</p>
    } @else if (error()) {
      <div class="alert alert-danger mb-0">{{ error() }}</div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()" class="row g-3">
        <div class="col-12 col-md-4">
          <label class="form-label fw-semibold" for="ue-status">Status</label>
          <select id="ue-status" class="form-select" formControlName="status">
            @for (s of statusOptions; track s) {
              <option [value]="s">{{ s }}</option>
            }
          </select>
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label fw-semibold" for="ue-gender">Gender</label>
          <select id="ue-gender" class="form-select" formControlName="gender">
            @for (g of genderOptions; track g) {
              <option [value]="g">{{ g }}</option>
            }
          </select>
        </div>
        <div class="col-12 col-md-4 d-flex flex-column justify-content-end gap-2">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="ue-pv" formControlName="phoneVerified" />
            <label class="form-check-label" for="ue-pv">Phone verified</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="ue-guest" formControlName="isGuest" />
            <label class="form-check-label" for="ue-guest">Guest session</label>
          </div>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold" for="ue-name">Name</label>
          <input id="ue-name" class="form-control" formControlName="name" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold" for="ue-email">Email</label>
          <input id="ue-email" type="email" class="form-control" formControlName="email" autocomplete="email" />
        </div>

        <div class="col-12">
          <h3 class="h6 fw-bold border-bottom pb-2 mb-2">Address</h3>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold" for="ue-country">Country</label>
          <input id="ue-country" class="form-control" formControlName="country" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold" for="ue-state">State</label>
          <input id="ue-state" class="form-control" formControlName="state" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold" for="ue-city">City</label>
          <input id="ue-city" class="form-control" formControlName="city" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-semibold" for="ue-pin">Pincode</label>
          <input id="ue-pin" class="form-control" formControlName="pincode" />
        </div>

        <div class="col-12 d-flex flex-wrap gap-2 pt-2">
          <button type="submit" class="btn-admin-primary" [disabled]="saving()">
            @if (saving()) {
              Saving…
            } @else {
              Save changes
            }
          </button>
        </div>
      </form>
    }
  </div>
</div>
